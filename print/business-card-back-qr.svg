      .row { font-family: Lato, "Helvetica Neue", Arial, sans-serif; font-size: 2.35mm; font-weight: 300; fill: #9A9080; letter-spacing: 0.06em; }
      .row strong { font-weight: 400; fill: #B8B0A4; }
