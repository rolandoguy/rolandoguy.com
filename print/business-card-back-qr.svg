<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="85mm" height="55mm" viewBox="0 0 85 55" aria-label="Rolando Guy business card back with QR">
  <title>Rolando Guy  back (with QR)</title>
  <defs>
