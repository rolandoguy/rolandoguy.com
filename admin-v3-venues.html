<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin v3 - Venues</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f5f5f5; color: #333; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    
    /* Shared navigation */
    .admin-v3-nav { margin-bottom: 20px; padding: 15px; background: white; border-radius: 8px; }
    .admin-v3-nav-section { margin-bottom: 10px; }
    .admin-v3-nav-section:last-child { margin-bottom: 0; }
    .admin-v3-nav-link { color: #0066cc; text-decoration: none; margin-right: 15px; font-size: 14px; display: inline-block; margin-bottom: 5px; }
    .admin-v3-nav-link:hover { text-decoration: underline; }
    .admin-v3-nav-link.active { color: #333; font-weight: bold; }
    .admin-v3-nav-link.admin-v3-nav-disabled { color: #999; cursor: default; }
    .admin-v3-nav-upcoming { padding-top: 10px; border-top: 1px solid #eee; }
    .admin-v3-sign-out { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; font-size: 13px; background: #6c757d; color: white; }
    .admin-v3-sign-out:hover { background: #5a6268; }
    
    /* Print styles */
    @media print {
      body { background: white; color: black; }
      .auth-gate, #navContainer, #signOutContainer, .status, .filter-bar, .venue-actions, .form, #createBtn, #refreshBtn { display: none !important; }
      .container { max-width: 100%; margin: 0; padding: 0; }
      h1 { margin-bottom: 10px; }
      .venue-item { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 10px; }
      .venue-item a { text-decoration: none; color: black; }
      .venue-item a[href]:after { content: " (" attr(href) ")"; font-size: 10px; color: #666; }
      .venue-actions { display: none; }
    }
    
    .print-header {
      display: none;
    }
    
    @media print {
      .print-header {
        display: block;
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ccc;
      }
      .print-header h1 {
        margin: 0;
        font-size: 18px;
      }
      .print-header .date {
        font-size: 12px;
        color: #666;
      }
    }
    
    .auth-gate { background: white; padding: 20px; border-radius: 8px; text-align: center; }
    .auth-gate a { color: #0066cc; }
    .auth-gate button { margin-top: 10px; padding: 8px 16px; cursor: pointer; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; }
    .toolbar button.primary { background: #0066cc; color: white; }
    .toolbar button.secondary { background: #e0e0e0; color: #333; }
    .status { padding: 10px; margin-bottom: 20px; border-radius: 4px; display: none; }
    .status.loading { background: #fff3cd; color: #856404; display: block; }
    .status.error { background: #f8d7da; color: #721c24; display: block; }
    .status.success { background: #d4edda; color: #155724; display: block; }
    .empty { text-align: center; padding: 40px; color: #666; background: white; border-radius: 8px; }
    .venue-list { display: flex; flex-direction: column; gap: 10px; }
    .venue-item { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
    .venue-item h3 { font-size: 16px; margin-bottom: 8px; }
    .venue-item .meta { font-size: 13px; color: #666; margin-bottom: 5px; }
    .venue-item .tags { margin-top: 8px; }
    .venue-item .tag { display: inline-block; background: #e0e0e0; padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-right: 5px; }
    .venue-item .actions { margin-top: 10px; display: flex; gap: 10px; }
    .venue-item .actions button { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; font-size: 12px; }
    .venue-item .actions button.edit { background: #0066cc; color: white; }
    .venue-item .actions button.delete { background: #dc3545; color: white; }
    .form-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .form-overlay.open { display: flex; }
    .form { background: white; padding: 20px; border-radius: 8px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .form h2 { margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }
    .form-actions button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-size: 14px; }
    .form-actions button.primary { background: #0066cc; color: white; }
    .form-actions button.secondary { background: #e0e0e0; color: #333; }
    .checkbox-group { display: flex; gap: 15px; flex-wrap: wrap; }
    .checkbox-group label { display: flex; align-items: center; font-weight: normal; }
    .checkbox-group input { width: auto; margin-right: 5px; }
    @media (max-width: 600px) {
      body { padding: 10px; }
      .toolbar { flex-direction: column; }
      .toolbar button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="print-header">
      <h1>Admin v3 - Venues</h1>
      <div class="date" id="printDate"></div>
    </div>
    <h1>Admin v3 - Venues</h1>
    
    <div id="authGate" class="auth-gate">
      <p>Loading...</p>
    </div>

    <div id="mainContent" style="display: none;">
      <div id="navContainer"></div>

      <h1>Venues</h1>

      <div class="toolbar">
        <button class="primary" id="createBtn">Create Venue</button>
        <button class="secondary" id="refreshBtn">Refresh</button>
        <button class="secondary" id="exportPdfBtn">Export PDF</button>
        <span id="signOutContainer" style="margin-left: auto;"></span>
      </div>

      <div class="status" id="status"></div>

      <div id="venueList" class="venue-list"></div>
    </div>
  </div>

  <div class="form-overlay" id="formOverlay">
    <div class="form">
      <h2 id="formTitle">Create Venue</h2>
      <form id="venueForm">
        <input type="hidden" id="venueId">
        
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" required>
        </div>

        <div class="form-group">
          <label for="venue_type">Venue Type</label>
          <select id="venue_type">
            <option value="">Select...</option>
            <option value="concert_hall">Concert Hall</option>
            <option value="church">Church</option>
            <option value="festival">Festival</option>
            <option value="private">Private</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city">
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country">
        </div>

        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address">
        </div>

        <div class="form-group">
          <label for="website">Website</label>
          <input type="url" id="website">
        </div>

        <div class="form-group">
          <label for="instagram">Instagram</label>
          <input type="text" id="instagram">
        </div>

        <div class="form-group">
          <label for="capacity">Capacity</label>
          <input type="number" id="capacity">
        </div>

        <div class="form-group">
          <label for="audience_type">Audience Type</label>
          <select id="audience_type">
            <option value="">Select...</option>
            <option value="classical">Classical</option>
            <option value="mixed">Mixed</option>
            <option value="general">General</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="programming_profile">Programming Profile</label>
          <select id="programming_profile">
            <option value="">Select...</option>
            <option value="conservative">Conservative</option>
            <option value="adventurous">Adventurous</option>
            <option value="balanced">Balanced</option>
          </select>
        </div>

        <div class="form-group">
          <label for="relationship_status">Relationship Status</label>
          <select id="relationship_status">
            <option value="">Select...</option>
            <option value="active">Active</option>
            <option value="past">Past</option>
            <option value="prospect">Prospect</option>
            <option value="dormant">Dormant</option>
          </select>
        </div>

        <div class="form-group">
          <label for="strategic_value">Strategic Value</label>
          <select id="strategic_value">
            <option value="">Select...</option>
            <option value="flagship">Flagship</option>
            <option value="regular">Regular</option>
            <option value="occasional">Occasional</option>
            <option value="target">Target</option>
          </select>
        </div>

        <div class="form-group">
          <label for="budget_level">Budget Level</label>
          <select id="budget_level">
            <option value="">Select...</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
            <option value="unknown">Unknown</option>
          </select>
        </div>

        <div class="form-group">
          <label for="priority_score">Priority Score (0-100)</label>
          <input type="number" id="priority_score" min="0" max="100">
        </div>

        <div class="form-group">
          <label>Program Fit</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="fits_tango"> Tango</label>
            <label><input type="checkbox" id="fits_classical"> Classical</label>
            <label><input type="checkbox" id="fits_private_events"> Private Events</label>
            <label><input type="checkbox" id="fits_crossover"> Crossover</label>
          </div>
        </div>

        <div class="form-group">
          <label for="seasonality">Seasonality</label>
          <input type="text" id="seasonality">
        </div>

        <div class="form-group">
          <label for="target_pitch">Target Pitch</label>
          <input type="text" id="target_pitch">
        </div>

        <div class="form-group">
          <label for="booking_window">Booking Window</label>
          <input type="text" id="booking_window">
        </div>

        <div class="form-group">
          <label for="typical_fee_range">Typical Fee Range</label>
          <input type="text" id="typical_fee_range">
        </div>

        <div class="form-group">
          <label for="decision_makers_known">Decision Makers Known</label>
          <input type="text" id="decision_makers_known">
        </div>

        <div class="form-group">
          <label for="tags">Tags (comma-separated)</label>
          <input type="text" id="tags" placeholder="tag1, tag2, tag3">
        </div>

        <div class="form-group">
          <label for="notes_internal">Internal Notes</label>
          <textarea id="notes_internal"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="primary">Save</button>
          <button type="button" class="secondary" id="cancelBtn">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="admin-v3-auth.js"></script>
  <script src="admin-v3-schemas.js"></script>
  <script src="admin-v3-factories.js"></script>
  <script src="admin-v3-helpers.js"></script>
  <script src="admin-v3-store-interface.js"></script>
  <script src="admin-v3-nav.js"></script>
  <script src="admin-v3-ui-helpers.js"></script>
  <script>
    (function () {
      'use strict';

      var store;
      var venues = [];
      var isCreating = false;
      var currentVenueId = null;

      function showAuthGate(show) {
        document.getElementById('authGate').style.display = show ? 'block' : 'none';
        document.getElementById('mainContent').style.display = show ? 'none' : 'block';
      }

      function setStatus(message, type) {
        var statusEl = document.getElementById('status');
        statusEl.textContent = message;
        statusEl.className = 'status ' + type;
        if (message) {
          statusEl.style.display = 'block';
        } else {
          statusEl.style.display = 'none';
        }
      }

      function clearStatus() {
        setStatus('', '');
      }

      function showForm(show) {
        var overlay = document.getElementById('formOverlay');
        if (show) {
          overlay.classList.add('open');
        } else {
          overlay.classList.remove('open');
        }
      }

      function loadVenues() {
        setStatus('Loading venues...', 'loading');
        store.venues.getAll().then(function (data) {
          venues = data || [];
          clearStatus();
          renderVenues();
        }).catch(function (err) {
          setStatus('Error loading venues: ' + err.message, 'error');
        });
      }

      function renderVenues() {
        var listEl = document.getElementById('venueList');
        if (venues.length === 0) {
          listEl.innerHTML = '<div class="empty">No venues yet. Click "Create Venue" to add one.</div>';
          return;
        }

        var html = venues.map(function (venue) {
          var meta = [];
          if (venue.city) meta.push(escapeHtml(venue.city));
          if (venue.country) meta.push(escapeHtml(venue.country));
          if (venue.venue_type) meta.push(escapeHtml(venue.venue_type));
          
          var tagsHtml = '';
          if (venue.tags && venue.tags.length > 0) {
            tagsHtml = '<div class="tags">' + venue.tags.map(function (tag) {
              return '<span class="tag">' + escapeHtml(tag) + '</span>';
            }).join('') + '</div>';
          }

          return '<div class="venue-item">' +
            '<h3>' + escapeHtml(venue.name) + '</h3>' +
            '<div class="meta">' + meta.join(' • ') + '</div>' +
            tagsHtml +
            '<div class="actions">' +
            '<button class="edit" data-id="' + venue.id + '">Edit</button>' +
            '<button class="delete" data-id="' + venue.id + '">Delete</button>' +
            '</div>' +
            '</div>';
        }).join('');

        listEl.innerHTML = html;

        // Attach action handlers
        window.adminV3UIHelpers.attachActionHandlers(listEl, {
          edit: openEditForm,
          delete: deleteVenue
        });
      }

      function openCreateForm() {
        isCreating = true;
        currentVenueId = null;
        document.getElementById('formTitle').textContent = 'Create Venue';
        document.getElementById('venueForm').reset();
        document.getElementById('venueId').value = '';
        showForm(true);
      }

      function openEditForm(id) {
        var venue = venues.find(function (v) { return v.id === id; });
        if (!venue) return;

        isCreating = false;
        currentVenueId = id;
        document.getElementById('formTitle').textContent = 'Edit Venue';
        document.getElementById('venueId').value = venue.id;
        document.getElementById('name').value = venue.name || '';
        document.getElementById('venue_type').value = venue.venue_type || '';
        document.getElementById('city').value = venue.city || '';
        document.getElementById('country').value = venue.country || '';
        document.getElementById('address').value = venue.address || '';
        document.getElementById('website').value = venue.website || '';
        document.getElementById('instagram').value = venue.instagram || '';
        document.getElementById('capacity').value = venue.capacity || '';
        document.getElementById('audience_type').value = venue.audience_type || '';
        document.getElementById('programming_profile').value = venue.programming_profile || '';
        document.getElementById('relationship_status').value = venue.relationship_status || '';
        document.getElementById('strategic_value').value = venue.strategic_value || '';
        document.getElementById('budget_level').value = venue.budget_level || '';
        document.getElementById('priority_score').value = venue.priority_score || '';
        document.getElementById('fits_tango').checked = venue.fits_tango || false;
        document.getElementById('fits_classical').checked = venue.fits_classical || false;
        document.getElementById('fits_private_events').checked = venue.fits_private_events || false;
        document.getElementById('fits_crossover').checked = venue.fits_crossover || false;
        document.getElementById('seasonality').value = venue.seasonality || '';
        document.getElementById('target_pitch').value = venue.target_pitch || '';
        document.getElementById('booking_window').value = venue.booking_window || '';
        document.getElementById('typical_fee_range').value = venue.typical_fee_range || '';
        document.getElementById('decision_makers_known').value = venue.decision_makers_known || '';
        document.getElementById('tags').value = (venue.tags || []).join(', ');
        document.getElementById('notes_internal').value = venue.notes_internal || '';
        showForm(true);
      }

      function saveVenue(e) {
        e.preventDefault();
        
        var venue = {
          name: document.getElementById('name').value,
          venue_type: document.getElementById('venue_type').value,
          city: document.getElementById('city').value,
          country: document.getElementById('country').value,
          address: document.getElementById('address').value,
          website: document.getElementById('website').value,
          instagram: document.getElementById('instagram').value,
          capacity: document.getElementById('capacity').value ? parseInt(document.getElementById('capacity').value) : null,
          audience_type: document.getElementById('audience_type').value,
          programming_profile: document.getElementById('programming_profile').value,
          relationship_status: document.getElementById('relationship_status').value,
          strategic_value: document.getElementById('strategic_value').value,
          budget_level: document.getElementById('budget_level').value,
          priority_score: document.getElementById('priority_score').value ? parseInt(document.getElementById('priority_score').value) : null,
          fits_tango: document.getElementById('fits_tango').checked,
          fits_classical: document.getElementById('fits_classical').checked,
          fits_private_events: document.getElementById('fits_private_events').checked,
          fits_crossover: document.getElementById('fits_crossover').checked,
          seasonality: document.getElementById('seasonality').value,
          target_pitch: document.getElementById('target_pitch').value,
          booking_window: document.getElementById('booking_window').value,
          typical_fee_range: document.getElementById('typical_fee_range').value,
          decision_makers_known: document.getElementById('decision_makers_known').value,
          tags: document.getElementById('tags').value.split(',').map(function (t) { return t.trim(); }).filter(Boolean),
          notes_internal: document.getElementById('notes_internal').value
        };

        if (isCreating) {
          var newVenue = window.adminV3Factories.createVenue(venue);
          setStatus('Creating venue...', 'loading');
          store.venues.insert(newVenue).then(function (saved) {
            clearStatus();
            showForm(false);
            loadVenues();
          }).catch(function (err) {
            setStatus('Error creating venue: ' + err.message, 'error');
          });
        } else {
          venue.id = currentVenueId;
          venue.updated_at = new Date().toISOString();
          setStatus('Updating venue...', 'loading');
          store.venues.update(currentVenueId, venue).then(function (saved) {
            clearStatus();
            showForm(false);
            loadVenues();
          }).catch(function (err) {
            setStatus('Error updating venue: ' + err.message, 'error');
          });
        }
      }

      function deleteVenue(id) {
        if (!confirm('Are you sure you want to delete this venue?')) return;

        setStatus('Deleting venue...', 'loading');
        store.venues.delete(id).then(function (success) {
          clearStatus();
          loadVenues();
        }).catch(function (err) {
          setStatus('Error deleting venue: ' + err.message, 'error');
        });
      }

      function escapeHtml(text) {
        if (!text) return '';
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function init() {
        // Set print date
        document.getElementById('printDate').textContent = formatDate(new Date());
        
        // Export PDF button
        document.getElementById('exportPdfBtn').addEventListener('click', function () {
          window.print();
        });
        
        // Initialize auth
        window.adminV3Auth.init().then(function (initialized) {
          if (!initialized) {
            document.getElementById('authGate').innerHTML = '<p>Auth initialization failed. Please refresh.</p>';
            return;
          }

          // Wait for auth state resolution
          return window.adminV3Auth.ensureAuthResolved();
        }).then(function (resolved) {
          if (!resolved) {
            document.getElementById('authGate').innerHTML = '<p>Auth state resolution failed. Please refresh.</p>';
            return;
          }

          // Check auth
          return window.adminV3Auth.checkAuth();
        }).then(function (result) {
          if (!result.authenticated) {
            document.getElementById('authGate').innerHTML = '<p>Access denied. No user session found.</p><p>Please <a href="admin-v2.html" target="_blank">sign in via Admin v2</a>, then return here.</p><p><button id="retryAuthBtn">Retry</button></p>';
            document.getElementById('retryAuthBtn').addEventListener('click', function () {
              window.location.reload();
            });
            return;
          }

          showAuthGate(false);

          // Initialize shared navigation
          if (window.adminV3Nav) {
            window.adminV3Nav.renderNav('navContainer', 'venues');
            window.adminV3Nav.renderSignOut('signOutContainer', function () {
              window.adminV3Auth.signOut().then(function () {
                window.location.href = 'admin-v2.html';
              });
            });
          }

          // Initialize store
          try {
            store = window.adminV3StoreInterface.createFirestoreStore();
            loadVenues();
          } catch (err) {
            setStatus('Error initializing store: ' + err.message, 'error');
          }
        }).catch(function (err) {
          document.getElementById('authGate').innerHTML = '<p>Error: ' + err.message + '</p>';
        });

        // Event listeners
        document.getElementById('refreshBtn').addEventListener('click', loadVenues);
        document.getElementById('createBtn').addEventListener('click', openCreateForm);
        document.getElementById('cancelBtn').addEventListener('click', function () {
          showForm(false);
        });
        document.getElementById('venueForm').addEventListener('submit', saveVenue);
      }

      // Start when DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
