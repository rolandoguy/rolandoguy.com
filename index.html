<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolando Guy · Tenor Berlin | Opera, Recital, Tango & Concert</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Mantenemos tus variables y estilos de diseño originales */
        :root {
            --bg:#0D0D12; --surface:#16161E; --gold:#D4A843; --text:#F0EDE6; --text-dim:#9A9080;
            --border:rgba(212,168,67,0.18);
            --ff-title:'Cormorant Garamond',serif; --ff-caps:'Cinzel',serif; --ff-body:'Lato',sans-serif;
        }
        body { background: var(--bg); color: var(--text); font-family: var(--ff-body); margin: 0; cursor: auto; }
        
        /* Estilos para que las secciones se vean como antes */
        section { padding: 90px 0; border-bottom: 1px solid var(--border); }
        .section-inner { max-width: 1200px; margin: 0 auto; padding: 0 60px; }
        h2 { font-family: var(--ff-title); font-size: 3.5rem; font-weight: 300; text-align: center; margin-bottom: 40px; }
        h2 em { font-style: italic; color: var(--gold); }
        
        /* Admin Panel mejorado visualmente */
        .adm { position: fixed; inset: 0; z-index: 9999; background: rgba(8,8,12,0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .adm.open { display: flex; }
        .adm-wrap { background: #1a1a1a; width: 90%; max-width: 500px; padding: 40px; border: 1px solid var(--gold); border-radius: 4px; text-align: center; }
        .adm-input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; margin: 15px 0; outline: none; }
        .adm-btn { background: var(--gold); color: black; border: none; padding: 12px 30px; font-family: var(--ff-caps); font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Botón Admin flotante (casi invisible) */
        .admin-trigger { position: fixed; bottom: 20px; right: 20px; background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 5px 10px; font-size: 0.6rem; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .admin-trigger:hover { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

    <section id="hero" style="height: 60vh; display: flex; align-items: center; justify-content: center; background: url('img/hero-bg.webp') center/cover;">
        <div style="text-align: center;">
            <h1 style="font-family: var(--ff-title); font-size: 5rem; margin: 0;">Rolando <em>Guy</em></h1>
            <p style="font-family: var(--ff-caps); letter-spacing: 4px; color: var(--gold);">Lyric Tenor · Berlin</p>
        </div>
    </section>

    <section id="about">
        <div class="section-inner">
            <h2 id="bioH2">A voice <em>forged</em> in tradition</h2>
            <p id="bioP1" style="max-width: 800px; margin: 0 auto; text-align: center; color: var(--text-dim);"></p>
        </div>
    </section>

    <div class="adm" id="adm">
        <div class="adm-wrap">
            <h3 style="font-family: var(--ff-caps); color: var(--gold); margin-top: 0;">Access Admin Panel</h3>
            <div id="admLockWrap">
                <input type="password" id="admPwd" class="adm-input" placeholder="Enter Password" onkeydown="if(event.key==='Enter')admLogin()">
                <button class="adm-btn" onclick="admLogin()">LOGIN</button>
            </div>
            <div id="admContent" style="display:none; color: var(--gold); margin-top: 20px;">
                ✓ Unlocked. Loading Editor...
            </div>
            <button onclick="closeAdmin()" style="margin-top: 20px; background: none; border: none; color: var(--text-dim); cursor: pointer;">Cancel</button>
        </div>
    </div>

    <button class="admin-trigger" onclick="openAdmin()">✦ ADMIN</button>

    <script>
        // --- SEGURIDAD POR HASH (rolando2025) ---
        const AUTH_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

        async function admLogin() {
            const inputPwd = document.getElementById('admPwd').value;
            const msgUint8 = new TextEncoder().encode(inputPwd);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === AUTH_HASH) {
                document.getElementById('admLockWrap').style.display = 'none';
                document.getElementById('admContent').style.display = 'block';
                // Aquí se activaría tu lógica de edición original
                alert("Acceso concedido. ¡Hola Rolando!");
            } else {
                alert("Contraseña incorrecta");
                document.getElementById('admPwd').value = '';
            }
        }

        function openAdmin() { document.getElementById('adm').classList.add('open'); }
        function closeAdmin() { document.getElementById('adm').classList.remove('open'); }

        // --- CARGA DE DATOS ORIGINALES ---
        const DEFAULT_BIO = {
            p1: "Argentinian-Italian tenor Rolando Guy was born in Buenos Aires... [Your full bio content]"
        };

        // Función para inicializar tu contenido (como hacía Claude)
        function initContent() {
            document.getElementById('bioP1').textContent = DEFAULT_BIO.p1;
            // Aquí agregarías el resto de las funciones de renderizado (renderRep, renderPerfs, etc.)
        }

        window.onload = initContent;
    </script>
</body>
</html>
