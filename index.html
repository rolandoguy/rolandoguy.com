<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rolando Guy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Rolando Guy</div>
  <nav>
    <a href="#bio" data-i18n="nav_bio"></a>
    <a href="#events" data-i18n="nav_events"></a>
    <a href="#media" data-i18n="nav_media"></a>
    <a href="#contact" data-i18n="nav_contact"></a>
  </nav>
  <div class="lang-switch">
    <button onclick="setLang('de')">DE</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('es')">ES</button>
  </div>
</header>

<section class="hero">
  <h1>Rolando Guy</h1>
  <p data-i18n="hero_subtitle"></p>
</section>

<section id="bio" class="section">
  <h2 data-i18n="bio_title"></h2>
  <p data-i18n="bio_text"></p>
</section>

<section id="events" class="section">
  <h2 data-i18n="events_title"></h2>
  <div id="events-container"></div>
</section>

<section id="media" class="section">
  <h2 data-i18n="media_title"></h2>

  <div class="videos">
    <iframe src="https://www.youtube.com/embed/zDgSZm9WvYc" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/wWmlrZ6BLK0" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/uSyL6iWLtmA" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/-t5fr1m_mnc" allowfullscreen></iframe>
  </div>

  <div class="gallery">
    <img src="images/photo1.jpg" alt="Rolando Guy">
    <img src="images/photo2.jpg" alt="Rolando Guy">
    <img src="images/photo3.jpg" alt="Rolando Guy">
  </div>
</section>

<section id="contact" class="section">
  <h2 data-i18n="contact_title"></h2>
  <p>Email: info@rolandoguy.com</p>
</section>

<footer>
  © 2026 Rolando Guy
</footer>

<script src="script.js"></script>
</body>
</html>
